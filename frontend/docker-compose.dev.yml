version: '3.8'

services:
  # 前端开发环境
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: testhub_frontend_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - testhub_network

networks:
  testhub_network:
    driver: bridge
